server:
  port: 8089

spring:
  application:
    name: mail-service-seckill
  main:
    allow-bean-definition-overriding: true
  config:
    import: optional:nacos:mail-service-seckill.yaml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/seckill?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      config:
        enabled: true
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml
        group: DEFAULT_GROUP
    sentinel:
      transport:
        dashboard: localhost:8080
        port: 8720
      datasource:
        ds1:
          nacos:
            server-addr: ${NACOS_ADDR:127.0.0.1:8848}
            data-id: ${spring.application.name}-sentinel-rules.json
            group-id: DEFAULT_GROUP
            rule-type: flow
            data-type: json
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379
    lettuce:
      pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 2000ms


# ... existing code ...


mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.cloud.mail.api.*.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ... existing code ...
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: seckill-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
